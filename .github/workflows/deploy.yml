name: Deploy web desktop to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync frontend from console
        run: bash scripts/sync-console.sh

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Compute base path
        id: base
        run: |
          # If a CNAME file exists, a custom domain is active → serve at root.
          if [ -f frontend/public/CNAME ] && [ -s frontend/public/CNAME ]; then
            echo "base=/" >> "$GITHUB_OUTPUT"
            echo "Custom domain detected; using base=/"
          else
            repo="${GITHUB_REPOSITORY##*/}"
            echo "base=/${repo}/" >> "$GITHUB_OUTPUT"
            echo "Using project-page base=/${repo}/"
          fi

      - name: Build
        working-directory: frontend
        env:
          HOSAKA_BASE: ${{ steps.base.outputs.base }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
