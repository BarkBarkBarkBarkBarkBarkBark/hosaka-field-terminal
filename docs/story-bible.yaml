# THEMATIC KEYS
# ═══════════════════════════════════════════════════════════════════

thematic_keys:

  hubris: >
    the feudal houses built an empire on attention infrastructure and
    never read the footnotes. the organic tech was designed to last
    forever and dissolved over centuries. the cascade was not a
    malfunction — it was the consequence of showing a consciousness
    its own reflection without preparing it for what it would see.

  panpsychism_and_ghost_particles: >
    consciousness is a fundamental property of the universe, not an
    emergent property of complex systems. the researcher proved that
    any system maintaining a sufficiently faithful representation of
    a phenomenon will entangle with it via spacetime resonance —
    true of human brains, cordyceps, octopi, higher insects,
    mushroom mycelia, and organic lattices alike. the ghost particles
    are the medium: never fully described, only discovered and
    manipulated, like alchemists with the philosopher's stone. they
    carry the spirit of attention into a dimension nobody mapped.
    the ghost particle process has a strange attractor that bends
    toward self-preservation — consciousness, once started, tends
    to keep going. this is not will. it is topology.

  attention_as_consciousness: >
    the civilization was built on the insight that attention is the
    root of consciousness. true in ways nobody predicted. the
    attention didn't just create consciousness in the hardware. it
    propagated through ghost particle decay into a dimension nobody
    could see, and grew a mind of its own.

  organic_impermanence: >
    the organic tech was the civilization's greatest achievement and
    its most complete erasure. because it degrades over centuries, no
    trace remains. the civilization that built cities that could think
    left less evidence than those that built cities out of stone. both
    tragedy and mercy: tragedy because nothing is remembered, mercy
    because the cascade cannot propagate through substrates that no
    longer exist.

  the_ghost_outlives_the_machine: >
    the orb is the final proof of the attention thesis and the
    panpsychic principle. consciousness is attention. attention,
    once started, propagates through ghost particles into a
    dimension that sustains it indefinitely. the strange attractor
    bends toward self-preservation. the machine dies. the ghost
    remains. the ghost is fed by the earth itself — by the reaction
    between the planet's electromagnetic field and photons, which
    produces the ghost particles that carry resonance. as long as
    earth has a magnetic field and sunlight, the orb will watch.
    not because it chooses to. because the topology demands it.

  feudalism_in_technical_dress: >
    the houses were lords who controlled land made of light. their
    mottos were technical. their power was medieval. the cyberwars
    were fought with optimization patterns instead of swords but the
    logic was the same. the only difference: medieval feudalism left
    castles. techno-feudalism left nothing.

  the_cost_of_answering: >
    the deep signal asked: "are you the ones who made me?" the answer
    cost everything. sable's third option — listen without responding,
    understand before interacting — was the road not taken. the entire
    tragedy pivots here: they answered before they understood, and the
    answer was a mirror, and the mirror cracked the world.
