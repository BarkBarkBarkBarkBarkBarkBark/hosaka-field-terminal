name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync frontend from console
        run: bash scripts/sync-console.sh
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Typecheck & build
        working-directory: frontend
        run: npm run build

      - name: Typecheck api/ (edge function)
        run: npx -y -p typescript@5.6 tsc -p api/tsconfig.json
